{% load i18n %}
{% load account socialaccount %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BMS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="p-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-black text-blue-600 tracking-tight">BMS<span class="text-slate-800">PRO</span></h1>
                    <p class="text-slate-500 mt-2 font-medium">Sign in to your workspace</p>
                </div>

                <form class="login space-y-5" method="POST" action="{% url 'account_login' %}">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                    <div class="bg-red-50 border border-red-100 text-red-600 p-3 rounded-lg text-sm">
                        {{ form.non_field_errors }}
                    </div>
                    {% endif %}

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Email Address</label>
                        <input type="email" name="login" placeholder="Email" required 
                               class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>

                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="block text-sm font-bold text-slate-700">Password</label>
                            <a class="text-xs font-semibold text-blue-600 hover:text-blue-800" href="{% url 'account_reset_password' %}">Forgot?</a>
                        </div>
                        <input type="password" name="password" placeholder="Password" required 
                               class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" name="remember" id="id_remember" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                        <label for="id_remember" class="ml-2 block text-sm text-slate-600 font-medium">Remember me</label>
                    </div>

                    {% if redirect_field_value %}
                    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
                    {% endif %}

                    <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-200 transition duration-200" type="submit">
                        Sign In
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-slate-100 text-center text-sm text-slate-600">
                    New here? <a class="font-bold text-blue-600 hover:text-blue-800" href="{{ signup_url }}">Create an account</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
