<div id="modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-xl shadow-xl w-full max-w-md">
        <h3 class="text-xl font-bold mb-4">Upload Document</h3>
        <form hx-post="{% url 'file_manager:upload_file' %}" hx-encoding="multipart/form-data" hx-target="#modal" hx-swap="delete">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" onclick="this.closest('#modal').remove()" class="px-4 py-2 text-gray-500 hover:underline">Cancel</button>
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">Upload</button>
            </div>
        </form>
    </div>
</div>
