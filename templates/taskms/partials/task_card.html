<div data-task-id="{{ task.id }}" class="bg-white p-4 rounded-md shadow-sm border border-gray-100 group">
    <div class="flex justify-between items-start mb-2">
        <span class="...">{{ task.priority }}</span>
        
        <div class="opacity-0 group-hover:opacity-100 transition-opacity flex space-x-2">
            <button hx-get="{% url 'taskms:edit_task' task.id %}" hx-target="#modal-container" class="text-gray-400 hover:text-blue-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            </button>
            <button hx-post="{% url 'taskms:delete_task' task.id %}" hx-confirm="Are you sure you want to delete this task?" class="text-gray-400 hover:text-red-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </div>
    </div>
    <h4 class="font-semibold text-gray-800">{{ task.title }}</h4>
    <p class="text-xs text-gray-500 mt-1">Assigned to: {{ task.assigned_to.first_name|default:"Unassigned" }}</p>
    
    <div class="mt-4 pt-3 border-t border-gray-50 flex gap-2">
        {% if task.status != 'pending' %}
            <button hx-post="{% url 'taskms:update_status' task.id %}" hx-vals='{"status": "pending"}' hx-target="#main-content" class="text-[10px] bg-gray-100 px-2 py-1 rounded hover:bg-gray-200">← To Do</button>
        {% endif %}
        
        {% if task.status != 'in_progress' %}
            <button hx-post="{% url 'taskms:update_status' task.id %}" hx-vals='{"status": "in_progress"}' hx-target="#main-content" class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded hover:bg-blue-100">Next →</button>
        {% endif %}

        {% if task.status != 'completed' %}
            <button hx-post="{% url 'taskms:update_status' task.id %}" hx-vals='{"status": "completed"}' hx-target="#main-content" class="text-[10px] bg-green-50 text-green-600 px-2 py-1 rounded hover:bg-green-100">Done ✓</button>
        {% endif %}
    </div>
</div>
