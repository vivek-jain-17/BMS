<div id="workspace-modal" class="fixed inset-0 bg-gray-900 bg-opacity-60 h-full w-full z-50 flex items-center justify-center backdrop-blur-sm">
    <div class="p-8 border w-full max-w-md shadow-2xl rounded-xl bg-white relative">
        
        <div class="mb-6 text-center">
            <h3 class="text-2xl font-bold text-gray-900">Setup Workspace</h3>
            <p class="text-sm text-gray-500 mt-1">Enter your company details to get started.</p>
        </div>

        {% if error %}
        <div class="mb-4 bg-red-50 text-red-600 p-3 rounded-md text-sm border border-red-100">
            {{ error }}
        </div>
        {% endif %}

        <form hx-post="{% url 'dashboard:create_workspace' %}" hx-target="#workspace-modal" hx-swap="outerHTML">
            {% csrf_token %}
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Company Name</label>
                    <input type="text" name="company_name" value="{{ name|default:'' }}" required placeholder="e.g. Acme Corporation" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Workspace URL (Subdomain)</label>
                    <div class="flex items-center">
                        <input type="text" name="subdomain" value="{{ subdomain|default:'' }}" required placeholder="acme" 
                               class="flex-1 px-4 py-3 border border-gray-300 rounded-l-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                        <span class="bg-gray-100 border border-l-0 border-gray-300 px-4 py-3 text-gray-500 rounded-r-lg font-mono text-sm">
                            .bmspro.com
                        </span>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">This will be your unique login portal.</p>
                </div>
            </div>
            
            <div class="mt-8 flex justify-end gap-3">
                <button type="button" onclick="document.getElementById('workspace-modal').remove()" class="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-medium transition">
                    Cancel
                </button>
                <button type="submit" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md transition">
                    Create Workspace
                </button>
            </div>
        </form>
    </div>
</div>
