<div id="inv-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 h-full w-full z-50 flex items-center justify-center">
    <div class="p-6 border w-full max-w-2xl shadow-lg rounded-lg bg-white max-h-[80vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold">History: {{ product.name }}</h3>
            <button onclick="document.getElementById('inv-modal').remove()" class="text-red-500 font-bold text-xl">&times;</button>
        </div>
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-2 text-left text-xs text-gray-500 uppercase">Date</th>
                    <th class="px-4 py-2 text-left text-xs text-gray-500 uppercase">Action</th>
                    <th class="px-4 py-2 text-left text-xs text-gray-500 uppercase">Qty Change</th>
                    <th class="px-4 py-2 text-left text-xs text-gray-500 uppercase">New Total</th>
                    <th class="px-4 py-2 text-left text-xs text-gray-500 uppercase">User</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200 text-sm">
                {% for log in logs %}
                <tr>
                    <td class="px-4 py-2">{{ log.timestamp|date:"M d, H:i" }}</td>
                    <td class="px-4 py-2 font-semibold {% if log.action == 'IN' %}text-green-600{% else %}text-red-600{% endif %}">{{ log.get_action_display }}</td>
                    <td class="px-4 py-2">{{ log.quantity_changed }}</td>
                    <td class="px-4 py-2 font-bold">{{ log.new_quantity }}</td>
                    <td class="px-4 py-2 text-gray-500">{{ log.user.first_name|default:"System" }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="5" class="px-4 py-4 text-center text-gray-500">No history found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
