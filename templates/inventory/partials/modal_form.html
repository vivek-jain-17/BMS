<div id="inv-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 h-full w-full z-50 flex items-center justify-center">
    <div class="p-6 border w-full max-w-lg shadow-lg rounded-lg bg-white">
        <h3 class="text-xl font-bold mb-4">{{ title }}</h3>
        <form hx-post="{{ url }}" hx-target="#inv-modal" hx-swap="outerHTML">
            {% csrf_token %}
            <div class="space-y-4">{{ form.as_p }}</div>
            <div class="mt-6 flex justify-end gap-3">
                <button type="button" onclick="document.getElementById('inv-modal').remove()" class="px-4 py-2 bg-gray-100 rounded-md">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md">Save</button>
            </div>
        </form>
    </div>
</div>
